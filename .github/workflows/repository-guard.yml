name: Repository guard

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      base_ref:
        description: Optional Git base ref for a manual range check
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: repository-guard-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scope:
    name: classify changed scope
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      base_sha: ${{ steps.base.outputs.base_sha }}
      frontend: ${{ steps.scope.outputs.frontend }}
      backend: ${{ steps.scope.outputs.backend }}
      data: ${{ steps.scope.outputs.data }}
      design: ${{ steps.scope.outputs.design }}
      ai_log: ${{ steps.scope.outputs.ai_log }}
      guard: ${{ steps.scope.outputs.guard }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve comparison base
        id: base
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
        run: |
          BASE_SHA="${PR_BASE_SHA:-${PUSH_BEFORE_SHA:-${INPUT_BASE_REF:-origin/main}}}"
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="origin/main"
          fi
          git cat-file -e "${BASE_SHA}^{commit}"
          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Classify changed paths
        id: scope
        run: python scripts/ci/changed_scope.py --range "${{ steps.base.outputs.base_sha }}...${GITHUB_SHA}" --github-output "$GITHUB_OUTPUT"

  repository-policy:
    name: repository policy
    needs: scope
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check out repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Validate repository bootstrap
        run: python scripts/ci/validate_repo.py

      - name: Validate changed range and AI Log history
        run: python scripts/ci/validate_repo.py --range "${{ needs.scope.outputs.base_sha }}...${GITHUB_SHA}"

      - name: Test repository guard helpers
        if: needs.scope.outputs.guard == 'true'
        run: python -m unittest discover -s tests/ci -p "test_*.py"

      - name: Test AI Log
        if: needs.scope.outputs.ai_log == 'true'
        run: python -m unittest discover -s tests/ai_log -p "test_*.py"

  design-audit:
    name: design audit helpers
    needs: scope
    if: needs.scope.outputs.design == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.16.0'

      - name: Test design audit wrapper
        run: node --test tests/design/*.mjs

  backend:
    name: backend checks
    needs: scope
    if: needs.scope.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python and pip cache
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.lock.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.lock.txt

      - name: Check backend formatting and lint
        working-directory: backend
        run: |
          black --check .
          flake8 .

      - name: Test backend API contracts
        working-directory: backend
        run: pytest -q

  frontend:
    name: frontend checks
    needs: scope
    if: needs.scope.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node and npm cache
        uses: actions/setup-node@v6
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --fund=false

      - name: Lint, typecheck and build frontend
        working-directory: frontend
        run: npm run check

  data-metadata:
    name: data metadata
    needs: scope
    if: needs.scope.outputs.data == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check out repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Validate changed data metadata only
        run: python scripts/ci/validate_data.py --range "${{ needs.scope.outputs.base_sha }}...${GITHUB_SHA}"

  repository-guard:
    name: repository-guard
    needs: [scope, repository-policy, design-audit, backend, frontend, data-metadata]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Require every selected check to pass
        shell: bash
        run: |
          for RESULT in \
            "${{ needs.scope.result }}" \
            "${{ needs.repository-policy.result }}" \
            "${{ needs.design-audit.result }}" \
            "${{ needs.backend.result }}" \
            "${{ needs.frontend.result }}" \
            "${{ needs.data-metadata.result }}"; do
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              echo "A required CI job did not complete successfully: $RESULT" >&2
              exit 1
            fi
          done

  release-candidate:
    name: build dev release candidate
    needs: [scope, repository-guard]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/dev' &&
      needs.repository-guard.result == 'success' &&
      (needs.scope.outputs.frontend == 'true' || needs.scope.outputs.backend == 'true' || needs.scope.outputs.data == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node and npm cache
        uses: actions/setup-node@v6
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build standalone frontend artifact
        working-directory: frontend
        run: |
          npm ci --no-audit --fund=false
          npm run build
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -R public .next/standalone/public; fi

      - name: Package provider-neutral artifacts
        shell: bash
        run: |
          RELEASE_DIR="$RUNNER_TEMP/release-candidate"
          mkdir -p "$RELEASE_DIR"
          tar -C frontend/.next/standalone -czf "$RELEASE_DIR/frontend.tar.gz" .
          tar -C backend -czf "$RELEASE_DIR/backend.tar.gz" app requirements.txt requirements.lock.txt pyproject.toml .flake8
          python scripts/ci/release_manifest.py create \
            --frontend "$RELEASE_DIR/frontend.tar.gz" \
            --backend "$RELEASE_DIR/backend.tar.gz" \
            --run-id "$GITHUB_RUN_ID" \
            --output "$RELEASE_DIR/release-manifest.json"

      - name: Upload release candidate
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate
          path: ${{ runner.temp }}/release-candidate
          if-no-files-found: error
          retention-days: 5
